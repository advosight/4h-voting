<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1976d2" />
    <meta name="description" content="QR code-based voting system for 4H cat decorations with real-time results" />
    
    <!-- Disable caching for development -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="4H Cat Voting" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Performance optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//fonts.gstatic.com" />
    
    <!-- PWA manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    
    <title>4H Cat Voting</title>
    
    <script>
      // Early suppression of ResizeObserver errors
      window.addEventListener('error', function(e) {
        if (e.message === 'ResizeObserver loop completed with undelivered notifications.') {
          e.stopImmediatePropagation();
          return false;
        }
      });
      
      // Performance monitoring
      window.performance.mark('app-start');
      
      // Critical resource hints
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          // Preload critical resources
          const criticalResources = [
            '/static/css/main.css',
            '/static/js/main.js'
          ];
          
          criticalResources.forEach(function(resource) {
            const link = document.createElement('link');
            link.rel = 'preload';
            link.href = resource;
            link.as = resource.endsWith('.css') ? 'style' : 'script';
            document.head.appendChild(link);
          });
        });
      }
      
      // Network status detection
      window.addEventListener('online', function() {
        console.log('Network: Online');
        document.body.classList.remove('offline');
        document.body.classList.add('online');
      });
      
      window.addEventListener('offline', function() {
        console.log('Network: Offline');
        document.body.classList.remove('online');
        document.body.classList.add('offline');
      });
      
      // Initial network status (deferred until <body> exists, since this
      // script runs in <head> before the body element is parsed)
      function setInitialNetworkStatus() {
        if (navigator.onLine) {
          document.body.classList.add('online');
        } else {
          document.body.classList.add('offline');
        }
      }
      if (document.body) {
        setInitialNetworkStatus();
      } else {
        document.addEventListener('DOMContentLoaded', setInitialNetworkStatus);
      }
    </script>
    
    <style>
      /* Critical CSS for loading state */
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f5f5f5;
        /* Safe area support for devices with notches */
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      
      /* Loading indicator */
      .loading-indicator {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #e0e0e0;
        border-top: 4px solid #1976d2;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Offline indicator */
      body.offline::before {
        content: 'Offline Mode';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: #f44336;
        color: white;
        text-align: center;
        padding: 8px;
        font-size: 14px;
        z-index: 9999;
      }
      
      /* Hide loading indicator when app loads */
      #root:not(:empty) + .loading-indicator {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div class="loading-indicator">
      <div class="loading-spinner"></div>
      <div>Loading 4H Cat Voting...</div>
    </div>
  </body>
</html>
