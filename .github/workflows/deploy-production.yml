name: Deploy to Production

on:
  push:
    branches: [main]

# Prevent overlapping production deploys if multiple pushes land close together.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write   # required for AWS OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install frontend dependencies
        # --legacy-peer-deps: react-scripts@5.0.1 peer-requires typescript@"^3.2.1 || ^4",
        # but this project uses typescript@^6. npm install tolerates this locally; npm ci
        # enforces it strictly and fails without this flag.
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        # react-scripts' fork-ts-checker-webpack-plugin typechecks src/ as part of this
        # build and fails it on real type errors -- no separate frontend typecheck step
        # needed. (The root tsconfig.json only covers infrastructure/**, not src/.)
        run: npm run build

      - name: Install infrastructure dependencies
        working-directory: infrastructure
        run: npm ci --legacy-peer-deps

      - name: Typecheck infrastructure
        working-directory: infrastructure
        run: npx tsc --noEmit -p .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-west-2

      - name: Deploy (CDK)
        working-directory: infrastructure
        run: npx cdk deploy CatVotingStack -c stage=production --require-approval never
