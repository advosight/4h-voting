name: Deploy to Production

on:
  push:
    branches: [main]

# Prevent overlapping production deploys if multiple pushes land close together.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write   # required for AWS OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node 20 rejects --localstorage-file in NODE_OPTIONS (used by every
          # npm script in this repo, e.g. `build`/`test`); Node 22+ allows it.
          node-version: '22'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        # `vite build` (via esbuild) transpiles without type-checking -- same as the
        # prior CRA/webpack bundle output, which doesn't fail on type errors either.
        # There's a real amount of pre-existing type debt in src/ (run `npm run
        # typecheck` to see it) that was never a hard gate; not enforcing it here
        # preserves that. (tsconfig.app.json covers src/ for the IDE and vitest; the
        # root tsconfig.json only covers infrastructure/**.)
        #
        # The production environment's vars are already named VITE_* (not REACT_APP_*
        # -- that was a stale guess from before the vars existed). Reference them
        # directly so import.meta.env picks up the real values instead of silently
        # falling back to the hardcoded defaults in src/index.tsx.
        env:
          VITE_USER_POOL_ID: ${{ vars.VITE_USER_POOL_ID }}
          VITE_USER_POOL_CLIENT_ID: ${{ vars.VITE_USER_POOL_CLIENT_ID }}
          VITE_REGION: ${{ vars.VITE_REGION }}
          VITE_GRAPHQL_ENDPOINT: ${{ vars.VITE_GRAPHQL_ENDPOINT }}
          VITE_GRAPHQL_API_KEY: ${{ vars.VITE_GRAPHQL_API_KEY }}
          VITE_VOTING_API_ENDPOINT: ${{ vars.VITE_VOTING_API_ENDPOINT }}
        run: npm run build

      - name: Install infrastructure dependencies
        working-directory: infrastructure
        run: npm ci

      - name: Typecheck infrastructure
        working-directory: infrastructure
        run: npx tsc --noEmit -p .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-west-2

      - name: Deploy (CDK)
        working-directory: infrastructure
        run: npx cdk deploy CatVotingStack -c stage=production --require-approval never
